<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/app}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Main content -->
    <section layout:fragment="content" class="max-w-5xl mx-auto p-8 mt-8">

        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Listado de Usuarios</h1>
            <a th:href="@{/users/create}"
                class="inline-block px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition font-medium">Crear
                Nuevo Usuario</a>
        </div>

        <ul>
            <li th:each="user, loop : ${users}" th:object="${user}" class="mb-4 p-4 bg-gray-50 rounded">
                <h2 class="text-lg font-semibold text-gray-800">ID: [[*{id}]]</h2>
                <h2 class="text-lg font-semibold text-gray-800">Name: [[*{name}]]</h2>
                <p class="text-gray-600">Email: [[*{email}]]</p>
                <a th:href="@{/users/{id}(id=${user.id})}"
                    class="inline-block my-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition font-medium\">Ver
                    Detalles</a>
            </li>
        </ul>
    </section>

</body>

</html>
