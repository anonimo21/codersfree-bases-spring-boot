<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/app}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Main content -->
    <section layout:fragment="content" class="max-w-5xl mx-auto p-8 mt-8">
        <div class="bg-white p-6 rounded shadow">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Detalles del Usuario</h1>
            <p class="text-gray-600">ID del usuario: <span th:text="${userId}"></span></p>
        </div>
    </section>

</body>

</html>
