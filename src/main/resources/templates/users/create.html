<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/app}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Main content -->
    <section layout:fragment="content" class="max-w-5xl mx-auto p-8 mt-8">

        <h1 class="text-3xl font-bold text-gray-800">Crear Nuevo Usuario</h1>
        <form method="post" class="mt-6 bg-white p-6 rounded shadow" th:action="@{/users}" th:object="${userDto}">
            <div class="mb-4">
                <label for="name" class="block text-gray-700">Nombre:</label>
                <input type="text" id="name" th:field="*{name}" class="w-full border border-gray-300 p-2 rounded mt-1">
                <div th:if="${#fields.hasErrors('name')}" class="text-red-500 text-sm">
                    <span th:errors="${userDto.name}"></span>
                </div>
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700">Email:</label>
                <input type="email" id="email" th:field="*{email}" class="w-full border border-gray-300 p-2 rounded mt-1">
                <div th:if="${#fields.hasErrors('email')}" class="text-red-500 text-sm">
                    <span th:errors="${userDto.email}"></span>
                </div>
            </div>
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Crear
                Usuario</button>
        </form>
    </section>

</body>

</html>
